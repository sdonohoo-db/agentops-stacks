# Component: vector_index — optional scheduled sync job
# Include this in your bundle's resources/ directory for periodic re-indexing.

resources:
  jobs:
    vector_sync_job:
      name: ${bundle.target}-${bundle.name}-vector-sync
      tasks:
        - task_key: SyncVectorIndex
          notebook_task:
            notebook_path: ../notebooks/VectorSearchSync.py
            base_parameters:
              vs_endpoint_name: ${var.vs_endpoint_name}
              vs_index_name: ${var.vs_index_name}
              vs_source_table: ${var.vs_source_table}
              vs_embedding_endpoint: ${var.vs_embedding_endpoint}
              vs_text_column: ${var.vs_text_column}
              vs_id_column: ${var.vs_id_column}

      schedule:
        quartz_cron_expression: "0 0 5 * * ?"
        timezone_id: UTC

      permissions:
        - level: CAN_VIEW
          group_name: users
