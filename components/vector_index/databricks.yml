# Component: vector_index
# Vector Search index with Delta Sync from a UC source table
#
# Add this snippet to your bundle's resources/ directory or merge into databricks.yml.

variables:
  vs_endpoint_name:
    description: "Vector Search endpoint name"
    default: ${bundle.target}-${bundle.name}-vs-endpoint
  vs_index_name:
    description: "Fully qualified index name (catalog.schema.index_name)"
  vs_source_table:
    description: "Source UC table to index (catalog.schema.table)"
  vs_embedding_endpoint:
    description: "Embedding model serving endpoint"
    default: "databricks-bge-large-en"
  vs_text_column:
    description: "Column containing text to embed"
    default: "content"
  vs_id_column:
    description: "Primary key column in source table"
    default: "id"
